kind = "web"
previewPath = "/"
title = "Stegofy QR Landing Page"
version = "1.0.0"
id = "frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/stegofy-qr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stegofy-qr", "run", "build" ]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
