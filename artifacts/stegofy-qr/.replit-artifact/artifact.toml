kind = "web"
previewPath = "/"
title = "Stegofy QR Landing Page"
version = "1.0.0"
id = "artifacts/stegofy-qr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20796

[services.development]
run = "pnpm --filter @workspace/stegofy-qr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stegofy-qr", "run", "build" ]
publicDir = "artifacts/stegofy-qr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20796"
BASE_PATH = "/"
